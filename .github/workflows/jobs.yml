name: jobs

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jobs
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run aggregator
        run: pnpm start

      - name: Commit jobs.json and JOBS.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update jobs'
          file_pattern: 'data/jobs.json data/archive/*.json JOBS.md'
