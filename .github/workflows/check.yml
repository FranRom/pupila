name: check

# Runs on every push to main and every PR. Validates that:
#   1. Biome lint + format are clean
#   2. Node 22.x + pnpm 11.x match the supported local runtime
#   3. All 3 TypeScript configs typecheck (src, tests, ui)
#   4. The full Vitest suite passes
#   5. The TypeScript build produces a dist/ output (catches issues that
#      tsc --noEmit alone would miss, e.g. emit-only failures)
#   6. The UI Vite build produces ui/dist/ (catches React/Vite breakage)
#   7. The first-paint chunks stay within the bundle-size budget
#   8. No high-severity CVEs in production deps
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome — lint + format check
        run: pnpm run lint

      - name: TypeScript — typecheck (src, tests, ui)
        run: pnpm run typecheck

      - name: Vitest — run unit tests
        run: pnpm test

      - name: TypeScript — build (tsc → dist/)
        run: pnpm run build

      - name: Vite — build UI bundle (ui/dist/)
        run: pnpm run ui:build

      - name: Bundle-size budget (first-paint chunks)
        run: pnpm run lint:bundle-size

      - name: Audit production deps
        run: pnpm audit --prod --audit-level high
        continue-on-error: true
